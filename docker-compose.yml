services:
  postgres:
    image: postgres:16-alpine
    container_name: image2-postgres
    restart: unless-stopped
    env_file:
      - .env.production
    volumes:
      - image2_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: image2-web
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env.production
    ports:
      - "3000:3000"
    volumes:
      - image2_generated:/app/public/generated
      - image2_uploads:/app/public/uploads

volumes:
  image2_postgres_data:
  image2_generated:
  image2_uploads:
