<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#031038"/>
      <stop offset=".5" stop-color="#0A2A78"/>
      <stop offset="1" stop-color="#0B1E63"/>
    </linearGradient>
    <radialGradient id="glowA" cx="26%" cy="30%" r="55%">
      <stop offset="0" stop-color="#2FA0FF" stop-opacity=".38"/>
      <stop offset="1" stop-color="#031038" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="86%" cy="72%" r="52%">
      <stop offset="0" stop-color="#22E7FF" stop-opacity=".30"/>
      <stop offset="1" stop-color="#031038" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#FFFFFF"/><stop offset=".6" stop-color="#DCEEFF"/><stop offset="1" stop-color="#8FC7FF"/>
    </linearGradient>
    <linearGradient id="logoGrad" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#3AA0FF"/><stop offset="1" stop-color="#1677FF"/>
    </linearGradient>
    <linearGradient id="btnGrad" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#38BDF8"/><stop offset="1" stop-color="#1677FF"/>
    </linearGradient>
    <linearGradient id="panelGrad" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#123B92" stop-opacity=".92"/><stop offset="1" stop-color="#0B2360" stop-opacity=".92"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#7DD3FC" stroke-opacity=".06" stroke-width="1"/>
    </pattern>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#02061F" flood-opacity=".45"/>
    </filter>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feDropShadow dx="0" dy="0" stdDeviation="16" flood-color="#38BDF8" flood-opacity=".55"/>
    </filter>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#grid)"/>
  <rect width="1280" height="640" fill="url(#glowA)"/>
  <rect width="1280" height="640" fill="url(#glowB)"/>

  <!-- 左上 品牌 -->
  <g transform="translate(72 60)">
    <rect x="0" y="0" width="58" height="58" rx="17" fill="url(#logoGrad)" filter="url(#glow)"/>
    <text x="29" y="41" text-anchor="middle" font-family="PingFang SC, Hiragino Sans GB, Microsoft YaHei, Noto Sans CJK SC, Arial, sans-serif" font-size="32" font-weight="900" fill="#FFFFFF">造</text>
    <text x="76" y="27" font-family="PingFang SC, Hiragino Sans GB, Microsoft YaHei, Noto Sans CJK SC, Arial, sans-serif" font-size="24" font-weight="900" fill="#FFFFFF">造图台 Image2 AI</text>
    <text x="76" y="52" font-family="PingFang SC, Hiragino Sans GB, Microsoft YaHei, Noto Sans CJK SC, Arial, sans-serif" font-size="15" font-weight="700" fill="#9CC4FF">开源 · 可自部署 · MIT 协议</text>
  </g>

  <!-- 主标题 -->
  <g transform="translate(72 196)">
    <text x="0" y="0" font-family="PingFang SC, Hiragino Sans GB, Microsoft YaHei, Noto Sans CJK SC, Arial, sans-serif" font-size="72" font-weight="900" fill="url(#titleGrad)">开源 AI 生图系统</text>
    <text x="4" y="58" font-family="PingFang SC, Hiragino Sans GB, Microsoft YaHei, Noto Sans CJK SC, Arial, sans-serif" font-size="27" font-weight="800" fill="#CFE6FF">一句话出图 · 提示词润色 · 积分商城 · 一键部署</text>
    <rect x="4" y="86" width="360" height="5" rx="3" fill="#123B92"/>
    <rect x="4" y="86" width="120" height="5" rx="3" fill="#4FD2FF" filter="url(#glow)"/>
  </g>

  <!-- 功能标签 -->
  <g transform="translate(72 356)" font-family="PingFang SC, Hiragino Sans GB, Microsoft YaHei, Noto Sans CJK SC, Arial, sans-serif" font-weight="800" font-size="17">
    <g>
      <rect x="0" y="0" width="150" height="44" rx="22" fill="#0E2E7A" fill-opacity=".7" stroke="#5E9BFF" stroke-opacity=".45"/>
      <text x="75" y="29" text-anchor="middle" fill="#DCEEFF">专业绘画创作台</text>
    </g>
    <g transform="translate(162 0)">
      <rect x="0" y="0" width="150" height="44" rx="22" fill="#0E2E7A" fill-opacity=".7" stroke="#5E9BFF" stroke-opacity=".45"/>
      <text x="75" y="29" text-anchor="middle" fill="#DCEEFF">批量多风格生成</text>
    </g>
    <g transform="translate(324 0)">
      <rect x="0" y="0" width="150" height="44" rx="22" fill="#0E2E7A" fill-opacity=".7" stroke="#5E9BFF" stroke-opacity=".45"/>
      <text x="75" y="29" text-anchor="middle" fill="#DCEEFF">积分 / 会员 / 支付</text>
    </g>
    <g transform="translate(486 0)">
      <rect x="0" y="0" width="150" height="44" rx="22" fill="#0E2E7A" fill-opacity=".7" stroke="#5E9BFF" stroke-opacity=".45"/>
      <text x="75" y="29" text-anchor="middle" fill="#DCEEFF">运营管理后台</text>
    </g>
  </g>

  <!-- 一键部署命令 -->
  <g transform="translate(72 424)">
    <rect x="0" y="0" width="360" height="52" rx="14" fill="#02071F" fill-opacity=".7" stroke="#3B76E0" stroke-opacity=".5"/>
    <circle cx="24" cy="26" r="5" fill="#FF5F57"/><circle cx="42" cy="26" r="5" fill="#FEBC2E"/><circle cx="60" cy="26" r="5" fill="#28C840"/>
    <text x="86" y="34" font-family="Menlo, Consolas, Arial, monospace" font-size="22" font-weight="800" fill="#7CF3B0">$ ./install.sh</text>
  </g>

  <!-- 开源地址条 -->
  <g transform="translate(72 512)" filter="url(#soft)">
    <rect x="0" y="0" width="620" height="80" rx="20" fill="#06194B" fill-opacity=".8" stroke="#59B6FF" stroke-opacity=".5"/>
    <text x="26" y="33" font-family="PingFang SC, Hiragino Sans GB, Microsoft YaHei, Noto Sans CJK SC, Arial, sans-serif" font-size="15" font-weight="800" fill="#8FD0FF">⭐ GitHub 开源地址</text>
    <text x="26" y="62" font-family="Arial, sans-serif" font-size="26" font-weight="900" fill="#FFFFFF">github.com/Xue-chuxin/image2-ai</text>
    <line x1="470" y1="20" x2="470" y2="60" stroke="#5E9BFF" stroke-opacity=".3"/>
    <text x="492" y="33" font-family="PingFang SC, Hiragino Sans GB, Microsoft YaHei, Noto Sans CJK SC, Arial, sans-serif" font-size="15" font-weight="800" fill="#8FD0FF">在线演示</text>
    <text x="492" y="62" font-family="Arial, sans-serif" font-size="21" font-weight="900" fill="#E8F4FF">zaotutai.com</text>
  </g>

  <!-- 右侧 工作台卡片 mockup -->
  <g transform="translate(780 132) rotate(-3 250 190)" filter="url(#soft)">
    <rect x="0" y="0" width="440" height="376" rx="26" fill="url(#panelGrad)" stroke="#80C7FF" stroke-opacity=".7"/>
    <!-- 顶栏 -->
    <rect x="26" y="26" width="388" height="46" rx="14" fill="#09245F" fill-opacity=".8" stroke="#66B8FF" stroke-opacity=".3"/>
    <circle cx="52" cy="49" r="12" fill="url(#logoGrad)"/>
    <text x="52" y="55" text-anchor="middle" font-family="PingFang SC, Hiragino Sans GB, Microsoft YaHei, Noto Sans CJK SC, Arial, sans-serif" font-size="13" font-weight="900" fill="#FFFFFF">造</text>
    <text x="76" y="54" font-family="PingFang SC, Hiragino Sans GB, Microsoft YaHei, Noto Sans CJK SC, Arial, sans-serif" font-size="18" font-weight="900" fill="#FFFFFF">造图台 · 创作工作台</text>
    <rect x="330" y="38" width="70" height="22" rx="11" fill="#1677FF" fill-opacity=".7"/>
    <text x="365" y="53" text-anchor="middle" font-family="PingFang SC, Hiragino Sans GB, Microsoft YaHei, Noto Sans CJK SC, Arial, sans-serif" font-size="12" font-weight="800" fill="#FFFFFF">460 积分</text>
    <!-- 画布 -->
    <rect x="40" y="92" width="360" height="196" rx="20" fill="#071B54" fill-opacity=".72" stroke="#557CFF" stroke-opacity=".5"/>
    <rect x="66" y="116" width="120" height="30" rx="15" fill="#0E3A8F" fill-opacity=".8" stroke="#66E7FF" stroke-opacity=".35"/>
    <text x="126" y="136" text-anchor="middle" font-family="PingFang SC, Hiragino Sans GB, Microsoft YaHei, Noto Sans CJK SC, Arial, sans-serif" font-size="14" font-weight="900" fill="#BFF0FF">提示词润色</text>
    <rect x="256" y="116" width="90" height="30" rx="15" fill="#0E3A8F" fill-opacity=".8" stroke="#66E7FF" stroke-opacity=".35"/>
    <text x="301" y="136" text-anchor="middle" font-family="PingFang SC, Hiragino Sans GB, Microsoft YaHei, Noto Sans CJK SC, Arial, sans-serif" font-size="14" font-weight="900" fill="#BFF0FF">4 张 · 高清</text>
    <text x="220" y="228" text-anchor="middle" font-family="Arial, sans-serif" font-size="96" font-weight="900" fill="url(#titleGrad)" filter="url(#glow)">AI</text>
    <ellipse cx="220" cy="204" rx="140" ry="34" fill="none" stroke="#3FE6FF" stroke-width="4" opacity=".85" transform="rotate(-10 220 204)"/>
    <rect x="66" y="250" width="308" height="22" rx="11" fill="#DDF9FF" fill-opacity=".12" stroke="#7BD7FF" stroke-opacity=".24"/>
    <path d="M86 261h150M256 261h60" stroke="#BFF0FF" stroke-width="4" stroke-linecap="round" opacity=".7"/>
    <!-- 生成按钮 -->
    <rect x="40" y="304" width="360" height="46" rx="14" fill="url(#btnGrad)"/>
    <text x="220" y="333" text-anchor="middle" font-family="PingFang SC, Hiragino Sans GB, Microsoft YaHei, Noto Sans CJK SC, Arial, sans-serif" font-size="19" font-weight="900" fill="#FFFFFF">✦ 立即生成</text>
  </g>

  <!-- 底部技术栈 -->
  <g transform="translate(780 540)" font-family="PingFang SC, Hiragino Sans GB, Microsoft YaHei, Noto Sans CJK SC, Arial, sans-serif" font-size="15" font-weight="800" fill="#9CC4FF">
    <text x="0" y="20">Next.js 15</text>
    <text x="108" y="20" fill="#3B76E0">·</text>
    <text x="124" y="20">React 19</text>
    <text x="212" y="20" fill="#3B76E0">·</text>
    <text x="228" y="20">Prisma</text>
    <text x="308" y="20" fill="#3B76E0">·</text>
    <text x="324" y="20">PostgreSQL</text>
    <text x="440" y="20" fill="#3B76E0">·</text>
    <text x="456" y="20">Docker</text>
  </g>
</svg>
