name: 功能建议
description: 提出生图、部署、Provider、后台或文档改进建议
title: "[Feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: 你想解决什么问题？
      description: 请从真实使用场景出发描述，而不是只写实现方案。
      placeholder: 例如：自部署用户希望把生成图片放到对象存储，避免服务器磁盘增长过快。
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 你期望的方案
      description: 可以描述交互、配置项、接口、文档或部署方式。
    validations:
      required: true
  - type: dropdown
    id: scope
    attributes:
      label: 影响范围
      options:
        - 前台体验
        - 生图工作台
        - Provider 接入
        - DeepSeek 润色
        - 账号 / 权限
        - 积分 / 支付
        - 管理后台
        - 存储 / 部署
        - 文档
        - 其他
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 你考虑过的替代方案
      description: 如果没有可以留空。
  - type: textarea
    id: context
    attributes:
      label: 补充信息
      description: 可以附截图、竞品链接、配置片段或相关上下文。请勿提交密钥和真实凭证。
