services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env.production
    ports:
      - "${APP_PORT:-3000}:3000"
    shm_size: "2gb"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - image2_generated:/app/public/generated
      - image2_uploads:/app/public/uploads
      - image2_chrome_profile:/app/chrome-profile

volumes:
  image2_generated:
  image2_uploads:
  image2_chrome_profile:
